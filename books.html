<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biblioteca | Libros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">Biblioteca</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" href="books.html">Libros</a></li>
        <li class="nav-item"><a class="nav-link" href="manage.html">Gestión</a></li>
      </ul>
      <button id="theme-toggle" class="btn btn-outline-secondary btn-sm ms-lg-3 mt-2 mt-lg-0" type="button" aria-label="Cambiar tema">🌙 Modo oscuro</button>
    </div>
  </div>
</nav>

<main class="container py-5">
  <h1 class="h3 mb-1">Todos los libros</h1>
  <p class="text-secondary mb-4">Busca, filtra y explora el catálogo completo.</p>

  <section class="card card-clean p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-4"><input id="books-search" class="form-control" type="search" placeholder="Buscar por título o autor"></div>
      <div class="col-md-3"><select id="books-category" class="form-select"><option value="">Todas las categorías</option></select></div>
      <div class="col-md-2"><select id="books-status" class="form-select"><option value="">Todos los estados</option><option value="active">Activo</option><option value="inactive">Inactivo</option></select></div>
      <div class="col-md-2"><select id="books-sort" class="form-select"><option value="title-asc">Título A-Z</option><option value="title-desc">Título Z-A</option></select></div>
      <div class="col-md-1 d-grid"><button id="books-clear-filters" class="btn btn-outline-secondary">Limpiar</button></div>
    </div>
    <p id="books-total-label" class="text-secondary small mt-2 mb-0"></p>
  </section>

  <div class="card card-clean p-0 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Título</th><th>Autor</th><th>Categoría</th><th>Stock</th><th>Estado</th><th></th></tr></thead>
        <tbody id="books-table-body"></tbody>
      </table>
    </div>
  </div>

  <nav class="mt-4 d-flex justify-content-center"><ul id="books-pagination" class="pagination"></ul></nav>
</main>
<footer class="border-top py-4 text-center text-secondary small">© <span id="footer-year"></span> Biblioteca.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/mock-data.js"></script><script src="assets/js/app.js"></script><script src="assets/js/books.js"></script>
</body></html>
