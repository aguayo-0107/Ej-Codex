<!doctype html><html lang="es" data-bs-theme="light"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />  <script>
    (() => {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', savedTheme || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
<title>Biblioteca | Gestión</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head><body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-semibold" href="index.html">Biblioteca</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><ul class="navbar-nav ms-auto gap-lg-2"><li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li><li class="nav-item"><a class="nav-link" href="books.html">Libros</a></li><li class="nav-item"><a class="nav-link active" href="manage.html">Gestión</a></li></ul><button id="theme-toggle" class="btn btn-outline-secondary btn-sm ms-lg-3 mt-2 mt-lg-0" type="button" aria-label="Cambiar tema">🌙 Modo oscuro</button></div></div></nav>
<main class="container py-5"><h1 class="h3 mb-1">Gestión de libros</h1><p class="text-secondary mb-4">Crear, editar, prestar y eliminar libros.</p>
<div class="row g-4"><div class="col-lg-4"><div class="card card-clean p-3"><h2 id="form-title" class="h5">Nuevo libro</h2><div id="manage-alert"></div><form id="manage-form" class="row g-2"><input type="hidden" id="book-id"><div class="col-12"><input id="book-title" class="form-control" placeholder="Título" required></div><div class="col-12"><input id="book-author" class="form-control" placeholder="Autor" required></div><div class="col-12"><input id="book-publication_date" type="date" class="form-control" required></div><div class="col-12"><input id="book-image_url" type="url" class="form-control" placeholder="URL de imagen (opcional)"></div><div class="col-6"><input id="book-quantity" type="number" min="0" class="form-control" placeholder="Cantidad" required></div><div class="col-6"><select id="book-is_borrowed" class="form-select"><option value="false">Disponible</option><option value="true">Prestado</option></select></div><div class="col-12 d-flex gap-2"><button id="manage-submit-btn" class="btn btn-primary" type="submit">Guardar</button><button id="manage-cancel-btn" class="btn btn-outline-secondary" type="button">Limpiar</button></div></form></div></div>
<div class="col-lg-8"><div class="card card-clean p-3"><div class="row g-2 mb-3"><div class="col-md-8"><input id="manage-search" class="form-control" placeholder="Buscar"></div><div class="col-md-4"><select id="manage-status-filter" class="form-select"><option value="">Todos</option><option value="false">Disponible</option><option value="true">Prestado</option></select></div></div><div class="table-responsive"><table class="table table-hover"><thead class="table-light"><tr><th>ID</th><th>Título</th><th>Autor</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="manage-table-body"></tbody></table></div><nav class="d-flex justify-content-center"><ul id="manage-pagination" class="pagination"></ul></nav></div></div></div></main>
<div class="modal fade" id="confirmModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 id="confirmModalTitle" class="modal-title">Confirmar</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div id="confirmModalText" class="modal-body">¿Continuar?</div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button id="confirmModalActionBtn" class="btn btn-danger">Confirmar</button></div></div></div></div>
<footer class="border-top py-4 text-center text-secondary small">© <span id="footer-year"></span> Biblioteca.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script><script src="assets/js/manage.js"></script>
</body></html>
